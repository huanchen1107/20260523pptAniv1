name: Storyboard Generation
on:
  workflow_dispatch:
    inputs:
      render:
        description: 'Render storyboard HTML to MP4 video'
        required: false
        default: 'false'
jobs:
  storyboard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Node
        uses: actions/setup-node@v3
        with:
          node-version: '22'
      - name: Install dependencies
        run: npm ci
      - name: Make storyboard script executable
        run: chmod +x user/assets/generate_storyboard.sh
      - name: Generate storyboards
        run: ./user/assets/generate_storyboard.sh
      - name: Make render animation script executable
        run: chmod +x user/assets/render_animation.sh
      - name: Render animations (MP4) for each slide
        run: ./user/assets/render_animation.sh
      - name: Render videos (optional)
        if: ${{ github.event.inputs.render == 'true' }}
        run: |
          for html in user/assets/storyboards/*-storyboard.html; do
            mp4="${html%.html}.mp4"
            npx hyperframes render "$html" -o "$mp4"
          done
      - name: Upload storyboard artifacts
        uses: actions/upload-artifact@v3
        with:
          name: storyboards
          path: user/assets/storyboards/*
