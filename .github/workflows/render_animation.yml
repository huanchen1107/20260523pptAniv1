name: Render Animation
on:
  workflow_dispatch:
  workflow_run:
    workflows: ["Storyboard Generation"]
    types:
      - completed

jobs:
  render_animation:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    steps:
      - uses: actions/checkout@v3
      - name: Set up Node
        uses: actions/setup-node@v3
        with:
          node-version: '22'
      - name: Install dependencies
        run: npm ci
      - name: Make scripts executable
        run: |
          chmod +x user/assets/generate_storyboard.sh
          chmod +x user/assets/render_animation.sh
      - name: Generate storyboards
        run: ./user/assets/generate_storyboard.sh
      - name: Render animations (MP4) for each slide
        run: ./user/assets/render_animation.sh
      - name: Upload animation artifacts
        uses: actions/upload-artifact@v3
        with:
          name: animations
          path: user/assets/slides/*/*-animation.mp4
